<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="top-bar">
    <button id="toggleDark">🌓 Toggle Dark Mode</button>
</div>


    <div class="container">
        <h1>Event Registration Form</h1>

        <form id="registrationForm">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="rollNo">Roll Number:</label>
            <input type="number" id="rollNo" name="rollNo" required>

            <label for="department">Select Department:</label>
            <select id="department" name="department">
                <option value="CSE">CSE</option>
                <option value="ECE">ECE</option>
                <option value="IT">IT</option>
                <option value="CSM">CSM</option>
            </select>

            <label for="selectedEvent">Selected Event:</label>
            <input type="text" id="selectedEvent" name="selectedEvent" readonly>

            <button type="submit">Submit</button>
        </form>

        <p id="successMessage" style="display: none; color: green;">Successfully Registered!</p>
        
        <div id="qrcode" style="margin: 20px auto; width: fit-content;"></div>


        <h2>Registered Participants</h2>
        <ul id="participantsList"></ul>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const urlParams = new URLSearchParams(window.location.search);
            const selectedEvent = urlParams.get("event");
        
            console.log("Selected event from URL:", selectedEvent); // Debug log
        
            if (selectedEvent) {
                document.getElementById("selectedEvent").value = selectedEvent;
            }
        });
        
    </script>
    <script src="script1.js"></script>
</body>
</html>
